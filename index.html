function tplCureChart() {
  var data = [[0,20],[3,24],[6,28],[9,32],[12,35],[15,37],[18,38],[24,36],[30,33],[36,31],[48,27],[60,24],[72,22]];
  var W = 600, H = 180, PL = 36, PR = 12, PT = 16, PB = 24;
  function xS(h) { return PL + (h / 72) * (W - PL - PR); }
  function yS(t) { return H - PB - (t / 50) * (H - PT - PB); }
  var linePts = data.map(function (d) { return xS(d[0]) + "," + yS(d[1]); }).join(" ");
  var areaPath = "M " + xS(0) + "," + yS(0) + " " +
    data.map(function (d) { return "L " + xS(d[0]) + "," + yS(d[1]); }).join(" ") +
    " L " + xS(72) + "," + yS(0) + " Z";
  var yLines = [10, 20, 30, 40, 50].map(function (t) {
    return '<line x1="' + PL + '" y1="' + yS(t) + '" x2="' + (W - PR) + '" y2="' + yS(t) + '" stroke="#e2e8f0" stroke-dasharray="2 2"/>' +
      '<text x="' + (PL - 6) + '" y="' + (yS(t) + 3) + '" font-size="9" fill="#94a3b8" text-anchor="end">' + t + '°C</text>';
  }).join("");
  var xTicks = [0, 12, 24, 36, 48, 60, 72].map(function (t) {
    return '<text x="' + xS(t) + '" y="' + (H - PB + 14) + '" font-size="9" fill="#94a3b8" text-anchor="middle">' + t + 'h</text>';
  }).join("");
  return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width: 100%; display: block;">' +
    '<defs><linearGradient id="cureGrad" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>' +
      '<stop offset="100%" stop-color="#10b981" stop-opacity="0"/>' +
    '</linearGradient></defs>' +
    yLines + xTicks +
    '<line x1="' + PL + '" y1="' + yS(45) + '" x2="' + (W - PR) + '" y2="' + yS(45) + '" stroke="#f59e0b" stroke-dasharray="3 3" stroke-width="1.5"/>' +
    '<text x="' + (W - PR - 4) + '" y="' + (yS(45) - 3) + '" font-size="9" fill="#b45309" text-anchor="end">Max 45°C</text>' +
    '<path d="' + areaPath + '" fill="url(#cureGrad)"/>' +
    '<polyline points="' + linePts + '" fill="none" stroke="#10b981" stroke-width="2" stroke-linejoin="round"/>' +
    '<circle cx="' + xS(18) + '" cy="' + yS(38) + '" r="4" fill="#10b981" stroke="white" stroke-width="2"/>' +
    '<text x="' + xS(18) + '" y="' + (yS(38) - 8) + '" font-size="10" fill="#065f46" text-anchor="middle" font-weight="600">Peak 38°C</text>' +
  '</svg>';
}

          '<div class="passport-grid-name">Pour #' + pad3(p.id) + ' · Zone ' + p.zone + '</div>' +
          '<div class="passport-grid-sub">' + p.date + '</div>' +
          '<div class="passport-grid-detail">' +
            '<div>Volume · ' + p.volume + ' m³</div>' +
            '<div>Mix · ' + p.batch.mixCode + '</div>' +
            '<div>Specified · ' + p.strength.spec + ' MPa @ 28d</div>' +
          '</div>' +
        '</div>' +
      '</div>' +

      '<div class="passport-metrics">' +
        '<div class="passport-metric">' +
          '<div class="passport-metric-label">28-day Strength</div>' +
          '<div class="passport-metric-value">33.2 MPa</div>' +
          '<div class="passport-metric-sub">+10.7% over spec</div>' +
        '</div>' +
        '<div class="passport-metric">' +
          '<div class="passport-metric-label">Carbon</div>' +
          '<div class="passport-metric-value">245 kgCO₂e/m³</div>' +
          '<div class="passport-metric-sub">EPD ceiling 260</div>' +
        '</div>' +
        '<div class="passport-metric">' +
          '<div class="passport-metric-label">Cure Maturity</div>' +
          '<div class="passport-metric-value">1842 °C·h</div>' +
          '<div class="passport-metric-sub">target 1500</div>' +
        '</div>' +
      '</div>' +

      '<div class="passport-exception">' +
        '<div class="passport-exception-label">Field Exception · Resolved</div>' +
        '<div class="passport-exception-text">Water (+12 L) added at 10:46 to restore slump from 88 mm to 102 mm. Recorded by Foreman J. Park. Revised W/C 0.456. 28-day cylinder tests confirmed strength target met; recalculated carbon stayed under EPD ceiling.</div>' +
      '</div>' +

      '<div class="passport-verify">' +
        '<div class="qr-mock">' + tplQR("POUR-MBT-" + p.id + "-" + p.zone) + '</div>' +
        '<div class="passport-verify-text">' +
          '<div class="passport-verify-label">Verification</div>' +
          '<div class="passport-verify-url">pourid.io/v/' + pourCode(p) + '</div>' +
          '<div class="passport-verify-note">Scan or visit URL to retrieve the full evidence chain (' + p.audit.records + ' records). Sealed ' + p.audit.timestamp + '.</div>' +
        '</div>' +
      '</div>' +

      '<div class="passport-footer">' +
        '<div class="passport-footer-text">Issued by PourID · field data verified by independent third party</div>' +
        '<div class="passport-actions">' +
          '<button class="btn-ghost">Copy link</button>' +
          '<button class="btn-ghost">Print</button>' +
          '<button class="btn-primary">Download PDF</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function tplQR(seed) {
  var size = 21;
  var h = 0;
  for (var i = 0; i < seed.length; i++) {
    h = ((h * 31 + seed.charCodeAt(i)) >>> 0);
  }
  function rand() { h = (h * 1103515245 + 12345) >>> 0; return (h >>> 16) & 0xff; }
  function isFinder(x, y) {
    return (x < 7 && y < 7) || (x < 7 && y >= size - 7) || (x >= size - 7 && y < 7);
  }
  function finderOn(x, y) {
    var lx = x, ly = y;
    if (x >= size - 7) lx = x - (size - 7);
    if (y >= size - 7) ly = y - (size - 7);
    if (lx === 0 || lx === 6 || ly === 0 || ly === 6) return true;
    if (lx >= 2 && lx <= 4 && ly >= 2 && ly <= 4) return true;
    return false;
  }
  var cells = "";
  for (var y = 0; y < size; y++) {
    for (var x = 0; x < size; x++) {
      var on = false;
      if (isFinder(x, y)) on = finderOn(x, y);
      else on = rand() > 128;
      if (on) cells += '<rect x="' + x + '" y="' + y + '" width="1" height="1" fill="#0f172a"/>';
    }
  }
  return '<svg viewBox="0 0 ' + size + ' ' + size + '" style="width: 100%; height: 100%; display: block;">' + cells + '</svg>';
}

// ==================== RENDER ====================

function render() {
  var root = document.getElementById("root");
  root.className = "app";
  var inner;
  if (state.view === "overview") inner = tplOverview();
  else if (state.view === "detail") inner = tplDetail();
  else if (state.view === "passport") inner = tplPassport();
  root.innerHTML = tplNav() + '<main class="main">' + inner + '</main>' + tplFooter();
  window.scrollTo(0, 0);
}

document.addEventListener("click", function (e) {
  var target = e.target.closest("[data-action]");
  if (!target) return;
  var action = target.getAttribute("data-action");
  if (action === "select-pour") {
    state.view = "detail";
    render();
  } else if (action === "go-passport") {
    state.view = "passport";
    render();
  } else if (action === "go-back") {
    if (state.view === "passport") state.view = "detail";
    else if (state.view === "detail") state.view = "overview";
    render();
  }
});

render();
</script>
